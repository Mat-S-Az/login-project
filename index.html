<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="estilos/media-query.css" media="all">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" /> 

</head>
<body>
    <div>
        <img src="imagens/pexels-vlad-r-3753632-6738896.jpg" alt="imagem-topo" id="topimg">
        <main>
            <h1>Login</h1>
            <p id="msg">Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
            <form action="cadastro.php" method="get">
                <p>
                    <label for="iemail">
                        <span class="material-symbols-outlined" style="font-size: 35px;"> person </span>
                    </label>
                    <input type="text" name="email" id="iemail" maxlength="25" minlength="8" placeholder="Seu E-mail" size="25">
                </p>
                <p>
                    <label for="isenha">
                        <span class="material-symbols-outlined" style="font-size: 35px;">vpn_key</span>
                    </label>
                    <input type="password" name="senha" id="isenha" placeholder="Sua senha" size="25">
                </p>
                <p id="entrar">
                    Entrar
                </p>
                <p id="esqueci">
                    Esqueci a senha 
                    <span id="emojicarta" class="material-symbols-outlined">mail</span>
                </p>
        </main>
        </form>
        
    </div>
</body>
</html>
